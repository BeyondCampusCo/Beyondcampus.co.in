<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond Campus</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#08131F;
            color:white;
        }

        nav{
            width:100%;
            padding:20px 8%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:fixed;
            top:0;
            left:0;
            background:rgba(8,19,31,.85);
            backdrop-filter:blur(10px);
        }

        nav h2{
            color:#00D4FF;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:30px;
        }

        nav a{
            color:white;
            text-decoration:none;
        }

        .hero{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:70px;
            margin-bottom:20px;
        }

        p{
            font-size:22px;
            color:#cbd5e1;
        }

        button{
            margin-top:40px;
            padding:16px 40px;
            border:none;
            border-radius:50px;
            background:#00D4FF;
            color:#08131F;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

    </style>

</head>

<body>

<nav>

<h2>Beyond Campus</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Trips</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<h1>Beyond Campus</h1>

<p>Journeys Beyond Classrooms</p>

<button>Explore Trips</button>

</section>

</body>
</html>
